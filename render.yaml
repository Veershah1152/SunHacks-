services:
  - type: web
    name: system-backend
    env: python
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 8000
      - key: OLLAMA_BASE_URL
        value: "http://localhost:11434" # Need to change to managed endpoint or remove if using local
      - key: PYTHON_VERSION
        value: "3.11.0"
