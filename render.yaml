services:
  - type: web
    name: system-backend
    env: python
    region: ohio
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 8000
      - key: OLLAMA_BASE_URL
        sync: false # Set this in Render dashboard to your public tunnel URL
      - key: PYTHON_VERSION
        value: "3.11.0"
